<div class="auth-container">
    <h2>Login</h2>
        
    <form id="authForm">
        <div class="input-group">
            <label for="usuario">Usuário:</label>
            <input type="text" id="usuario" name="usuario" required>
        </div>
            
        <div class="input-group">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>
        </div>
            
        <button type="button" class="btn-auth" onclick="login()">Entrar</button>

    </form>

    <button id="redirect" hx-get="/register" 
                          hx-target="main" 
                          hx-push-url="true">
        Criar uma conta
    </button>
</div>

<style>
    .auth-container {
        font-family: var(--font-family2);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
    }

    .auth-container h2 {
        text-align: center;
        color: var(--cor4);
        margin-bottom: 30px;
        font-size: 24px;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        margin-bottom: 5px;
        color: var(--cor4);
        font-size: 14px;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
        box-sizing: border-box;
    }

    .input-group input:focus {
        outline: none;
        border-color: var(--cor1);
    }

    .btn-auth {
        width: 100%;
        padding: 12px;
        background: var(--cor1);
        color: var(--cor5);
        border: none;
        border-radius: 4px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-auth:hover {
        background: var(--cor1-1);
    }

    .auth-container #redirect {
        font-family: var(--font-family1);
        position: relative;
        color: var(--cor3);
        outline: none;
        border: none;
        cursor: pointer;
        top: 15px;
        text-decoration: wavy;
        background: none;
    }

</style>

<script>
    async function login() {
        const dados = {
            username: document.getElementById('usuario').value,
            password: document.getElementById('senha').value
        };

        const resposta = await fetch('/attemptLogin', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dados)
        });

        if (resposta.redirected) {
            window.location.href = resposta.url;
        } else {
            const resultado = await resposta.json();
            alert(resultado.error);
        }
    }
</script>
